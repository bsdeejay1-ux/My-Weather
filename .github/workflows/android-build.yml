name: TITAN Real Source Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node 22 & Java 21
      uses: actions/setup-node@v4
      with: { node-version: '22' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '21' }

    - name: Build Asli Next.js Source
      run: |
        npm install
        npm run build
        
    - name: Capacitor Sync
      run: |
        npm install -g @capacitor/cli
        npm install @capacitor/core @capacitor/android # <--- YEH LINE MISS THI
        rm -rf www
        cp -r out www
        npx cap sync android

    - name: Build Native Android (C++ NDK)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload MY REAL APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Weather-Real-Native-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
